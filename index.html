<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Se7enSyndraxe Özel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap');
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    font-family: 'Poppins', sans-serif; 
    background-color: #000; 
    overflow: hidden; 
    height: 100vh; 
    width: 100vw; 
    position: fixed; 
  }

  /* ARKA PLAN RESMİ - HEM PC HEM MOBİL UYUMLU */
  .bg-image {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover; /* Resmi bozmadan alanı kaplatır */
    object-position: center;
    z-index: -1;
    image-rendering: -webkit-optimize-contrast;
  }

  /* GİRİŞ EKRANI */
  #entrance {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 1000; 
    display: flex; 
    justify-content: center; 
    align-items: flex-end;
    padding-bottom: 15vh;
    transition: opacity 0.8s ease;
    background: #000;
  }

  .pink-btn {
    background: #ff4d6d; color: white; border: none; padding: 18px 65px; font-size: 22px;
    border-radius: 50px; cursor: pointer; box-shadow: 0 8px 30px rgba(255, 77, 109, 0.7);
    font-weight: 600; z-index: 1001; -webkit-tap-highlight-color: transparent;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

  /* ANA İÇERİK */
  #main-content {
    display: none; opacity: 0; flex-direction: column; align-items: center; justify-content: center;
    gap: 15px; height: 100vh; width: 100%; 
    position: relative; transition: opacity 0.6s ease;
    background: #000;
  }

  /* YAZILARIN OKUNMASI İÇİN KARARTMA */
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.45); z-index: 0;
  }

  .big-letter { 
    font-family: 'Great Vibes', cursive; 
    font-size: clamp(80px, 20vw, 150px); 
    color: #fff; 
    text-shadow: 0 0 25px rgba(255, 77, 109, 1);
    animation: glow 2.5s ease-in-out infinite;
    z-index: 10;
  }

  @keyframes glow {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.03); }
  }

  .card, .note-card { 
    background: rgba(255, 255, 255, 0.94); 
    border-radius: 25px; padding: 22px; text-align: center; 
    width: 88%; max-width: 350px; 
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); 
    z-index: 10;
  }

  #days-count { font-size: 58px; font-weight: 700; color: #ff4d6d; display: block; line-height: 1; }
  .days-label { font-size: 15px; font-weight: 600; color: #590d22; margin-top: 5px; }

  #bday-status { margin-top: 10px; font-size: 14px; color: #ff4d6d; font-weight: 600; font-style: italic; }

  .note-card { border-left: 7px solid #ff4d6d; border-radius: 12px; color: #333; text-align: left; }
  .note-card h3 { margin-bottom: 5px; color: #ff4d6d; font-size: 26px; font-family: 'Great Vibes', cursive; }
  
  .footer { 
    margin-top: 20px; font-size: 10px; color: #fff; letter-spacing: 2px; 
    text-transform: uppercase; font-weight: 600; text-shadow: 1px 1px 3px #000; z-index: 10; 
  }
</style>
</head>
<body>

  <div id="entrance">
    <img src="https://i.postimg.cc/s27xLnb5/Whats-App-Image-2026-03-28-at-20-46-02-(1).jpg" class="bg-image">
    <button class="pink-btn" onclick="startSurprise()">Tıkla.</button>
  </div>

  <div id="main-content">
    <img src="https://i.postimg.cc/pV6vDf6V/sahil-(1).jpg" class="bg-image">
    <div class="overlay"></div>

    <h1 class="big-letter">E</h1>
    
    <div class="card">
      <span id="days-count">0</span>
      <div class="days-label">Gündür Hayatımdasın</div>
      <div id="bday-status"></div>
    </div>

    <div class="note-card">
      <h3>E...</h3>
      <p>Dünyanın en güzel kızı... Seninle geçen her gün için teşekkür ederim. Seni seviyorum.</p>
    </div>

    <div class="footer">designed by se7ensyndraxe</div>
  </div>

<script>
  function startSurprise() {
    const ent = document.getElementById('entrance');
    const main = document.getElementById('main-content');
    ent.style.opacity = '0';
    setTimeout(() => { 
      ent.style.display = 'none'; 
      main.style.display = 'flex'; 
      setTimeout(() => { main.style.opacity = '1'; }, 50); 
    }, 800);
  }

  // GÜN SAYACI (12 EYLÜL 2022)
  const startDate = new Date(2022, 8, 12); 
  document.getElementById('days-count').innerText = Math.floor((new Date() - startDate) / 86400000);

  // DOĞUM GÜNÜ (12 AĞUSTOS)
  function updateBirthday() {
    const now = new Date();
    let nextBday = new Date(now.getFullYear(), 7, 12); 
    if (now > nextBday && now.getDate() !== 12) nextBday.setFullYear(now.getFullYear() + 1);
    const daysLeft = Math.ceil((nextBday - now) / 86400000);
    const statusEl = document.getElementById('bday-status');
    statusEl.innerText = (now.getMonth() === 7 && now.getDate() === 12) ? "Bugün Senin Doğum Günün! ❤️" : `Doğum gününe ${daysLeft} gün kaldı...`;
  }
  updateBirthday();
</script>

</body>
</html>
