<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Se7enSyndraxe Özel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap');
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    font-family: 'Poppins', sans-serif; 
    background-color: #000; 
    overflow: hidden; 
    height: 100vh; 
    width: 100vw; 
    position: fixed; 
  }

  /* GİRİŞ EKRANI */
  #entrance {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000 url('https://i.ibb.co/sJdgFtJb/WhatsApp-Image-2026-03-28-at-20-46-02.jpg') no-repeat center center;
    background-size: cover; z-index: 100; display: flex; 
    justify-content: center; align-items: flex-end; padding-bottom: 12vh;
    transition: opacity 0.8s ease;
  }

  .pink-btn {
    background: #ff4d6d; color: white; border: none; padding: 16px 50px; font-size: 20px;
    border-radius: 50px; cursor: pointer; box-shadow: 0 8px 25px rgba(255, 77, 109, 0.6);
    font-weight: 600; z-index: 101; -webkit-tap-highlight-color: transparent;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

  /* ANA İÇERİK EKRANI */
  #main-content {
    display: none; opacity: 0; flex-direction: column; align-items: center; justify-content: center;
    gap: 15px; height: 100vh; width: 100%; 
    background: radial-gradient(circle at center, #1a0508 0%, #000 100%);
    position: relative; transition: opacity 0.6s ease;
  }

  /* BÜYÜK E HARFİ (SURPRİZ TIKLAMA ALANI) */
  #big-letter { 
    font-family: 'Great Vibes', cursive; 
    font-size: clamp(90px, 30vw, 140px); 
    color: #ff4d6d; 
    text-shadow: 0 0 20px rgba(255, 77, 109, 0.9);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    z-index: 5;
    transition: transform 0.1s ease;
  }
  #big-letter:active { transform: scale(0.95); } /* Tıklayınca hafif basılma hissi */

  /* KART VE YAZILAR */
  .card { 
    background: rgba(255, 255, 255, 0.95); 
    border-radius: 25px; padding: 20px; text-align: center; 
    width: 90%; max-width: 320px; 
    box-shadow: 0 15px 30px rgba(255, 77, 109, 0.3);
    z-index: 4;
  }

  #days-count { font-size: 55px; font-weight: 700; color: #ff4d6d; display: block; line-height: 1; }
  .days-label { font-size: 14px; font-weight: 600; color: #590d22; margin-top: 5px; }

  /* DOĞUM GÜNÜ SAYACI STİLİ */
  #bday-status {
    margin-top: 10px; font-size: 15px; color: #ff4d6d; 
    font-weight: 600; font-style: italic;
    text-shadow: 0 0 5px rgba(255, 77, 109, 0.3);
  }

  .note-card { 
    background: rgba(255, 240, 243, 0.95); 
    border-left: 6px solid #ff4d6d; padding: 18px; 
    border-radius: 12px; width: 90%; max-width: 320px; color: #590d22; 
    z-index: 4;
  }
  
  .note-card h3 { margin-bottom: 5px; color: #ff4d6d; font-size: 24px; font-family: 'Great Vibes', cursive; }
  .note-card p { font-size: 14px; line-height: 1.5; }

  /* GİZLİ KALPLER VE E HARFİ PATLAMASI */
  .heart-particle { position: absolute; pointer-events: none; z-index: 1; opacity: 0; }
  
  /* Arka Plan Kalpleri (Yavaşça Süzülen) */
  .bg-heart { color: rgba(255, 77, 109, 0.4); animation: bgFloat 8s linear infinite; }
  @keyframes bgFloat { 
    0% { transform: translateY(110vh) scale(0); opacity: 0; } 
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } 
  }

  /* E Harfi Tıklama Patlaması (Dışarıya Saçılan) */
  .egg-heart { animation: eggBurst 1.2s ease-out forwards; }
  @keyframes eggBurst {
    0% { transform: translate(0, 0) scale(0); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(var(--tr)); opacity: 0; }
  }

  .footer { 
    margin-top: 20px; font-size: 10px; color: #fff; letter-spacing: 2px; 
    text-transform: uppercase; font-weight: 600; opacity: 0.7; z-index: 4;
  }
</style>
</head>
<body>

    <button class="pink-btn" onclick="startSurprise()">Tıkla.</button>
  </div>

  <div id="main-content">
    
    <div id="heart-container" style="position: absolute; width:100%; height:100%; top:0; left:0; overflow:hidden; z-index:1;"></div>

    <div class="card">

      <div class="days-label">Gündür Hayatımdasın</div>
      <div id="bday-status"></div>
    </div>

    <div class="note-card">

      <p>Dünyanın en güzel kızı... Seninle geçen her gün için teşekkür ederim. Seni seviyorum.</p>
    </div>

    <div class="footer">designed by se7ensyndraxe</div>
  </div>

      ent.style.display = 'none'; 
      main.style.display = 'flex'; 
      setTimeout(() => { 
        main.style.opacity = '1'; 
        initBackgroundHearts(); 
      }, 50); 
    }, 800);

      heart.style.animationDuration = (Math.random() * 4 + 6) + 's';
      heart.style.fontSize = (Math.random() * 10 + 12) + 'px';
      heart.style.animationDelay = (Math.random() * 5) + 's'; // Rastgele başlasınlar
      container.appendChild(heart);
    }
  }
