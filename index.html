<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; background-color: #000; overflow: hidden; height: 100vh; width: 100vw; position: fixed; }

  /* GİRİŞ EKRANI */
  #entrance {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000 url('https://i.ibb.co/sJdgFtJb/WhatsApp-Image-2026-03-28-at-20-46-02.jpg') no-repeat center center;
    background-size: cover; z-index: 9999; display: flex; 
    justify-content: center; align-items: flex-end; padding-bottom: 15vh;
    transition: opacity 0.8s ease;
  }

  /* TIKLA BUTONU - EN ÜSTTE VE GARANTİ TIKLANABİLİR */
  .pink-btn {
    background: #ff4d6d; color: white; border: none; padding: 18px 60px; font-size: 22px;
    border-radius: 50px; cursor: pointer; box-shadow: 0 10px 30px rgba(255, 77, 109, 0.6);
    font-weight: 600; z-index: 10000; -webkit-tap-highlight-color: transparent;
    animation: pulse 2s infinite; position: relative; pointer-events: auto !important;
  }

  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

  /* ANA İÇERİK */
  #main-content {
    display: none; opacity: 0; flex-direction: column; align-items: center; justify-content: center;
    gap: 15px; height: 100vh; width: 100%; 
    background: radial-gradient(circle at center, #1a0508 0%, #000 100%);
    position: relative; transition: opacity 0.6s ease;
  }

  #big-letter { 
    font-family: 'Great Vibes', cursive; font-size: clamp(90px, 30vw, 140px); 
    color: #ff4d6d; text-shadow: 0 0 20px rgba(255, 77, 109, 0.9);
    cursor: pointer; -webkit-tap-highlight-color: transparent; position: relative; z-index: 10;
  }

  .card { 
    background: rgba(255, 255, 255, 0.95); border-radius: 25px; padding: 20px; text-align: center; 
    width: 90%; max-width: 320px; box-shadow: 0 15px 30px rgba(255, 77, 109, 0.3); position: relative; z-index: 5;
  }

  #days-count { font-size: 55px; font-weight: 700; color: #ff4d6d; display: block; line-height: 1; }
  #bday-status { margin-top: 10px; font-size: 15px; color: #ff4d6d; font-weight: 600; font-style: italic; }

  .note-card { 
    background: rgba(255, 240, 243, 0.95); border-left: 6px solid #ff4d6d; padding: 18px; 
    border-radius: 12px; width: 90%; max-width: 320px; color: #590d22; position: relative; z-index: 5;
  }
  
  .note-card h3 { color: #ff4d6d; font-size: 24px; font-family: 'Great Vibes', cursive; }

  /* KALPLER */
  .heart-particle { position: absolute; pointer-events: none; }
  .bg-heart { color: rgba(255, 77, 109, 0.4); animation: bgFloat 8s linear infinite; z-index: 2; }
  @keyframes bgFloat { 
    0% { transform: translateY(110vh) scale(0); opacity: 0; } 
    50% { opacity: 0.8; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } 
  }

  .egg-heart { animation: eggBurst 1.2s ease-out forwards; z-index: 100; font-size: 20px; }
  @keyframes eggBurst {
    0% { transform: translate(0, 0) scale(0); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(var(--tr)); opacity: 0; }
  }

  .footer { margin-top: 20px; font-size: 10px; color: #fff; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; position: relative; z-index: 5; }
</style>
</head>
<body>

  <div id="entrance">
    <button type="button" class="pink-btn" id="start-btn">Tıkla.</button>
  </div>

  <div id="main-content">
    <div id="heart-container" style="position: absolute; width:100%; height:100%; top:0; left:0; overflow:hidden; z-index:1;"></div>
    <h1 id="big-letter">E</h1>
    <div class="card">
      <span id="days-count">0</span>
      <div style="font-size: 14px; font-weight: 600; color: #590d22;">Gündür Hayatımdasın</div>
      <div id="bday-status"></div>
    </div>
    <div class="note-card">
      <h3>E...</h3>
      <p>Dünyanın en güzel kızı... Seninle geçen her gün için teşekkür ederim. Seni seviyorum.</p>
    </div>
    <div class="footer">designed by se7ensyndraxe</div>
  </div>

<script>
  // Tıklama olayını en garanti yoldan bağlıyoruz
  document.getElementById('start-btn').addEventListener('click', function() {
    const ent = document.getElementById('entrance');
    const main = document.getElementById('main-content');
    
    // Geçiş efekti
    ent.style.opacity = '0';
    setTimeout(() => { 
      ent.style.display = 'none'; 
      main.style.display = 'flex'; 
      setTimeout(() => { 
        main.style.opacity = '1'; 
        initBackgroundHearts(); 
      }, 50); 
    }, 800);
  });

  // Arka plan kalpleri
  function initBackgroundHearts() {
    const container = document.getElementById('heart-container');
    for (let i = 0; i < 15; i++) {
      const heart = document.createElement('div'); 
      heart.className = 'heart-particle bg-heart'; 
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 100 + 'vw'; 
      heart.style.animationDuration = (Math.random() * 4 + 6) + 's';
      heart.style.animationDelay = (Math.random() * 5) + 's';
      container.appendChild(heart);
    }
  }

  // E Harfi Sürprizi (Easter Egg)
  let clickCount = 0;
  let clickTimer = null;
  document.getElementById('big-letter').addEventListener('click', function() {
    clickCount++;
    if (clickCount === 2) {
      const rect = this.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      for (let i = 0; i < 20; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart-particle egg-heart';
        heart.innerHTML = '❤️';
        heart.style.left = centerX + 'px';
        heart.style.top = centerY + 'px';
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 150 + 50;
        heart.style.setProperty('--tx', `${Math.cos(angle) * dist}px`);
        heart.style.setProperty('--ty', `${Math.sin(angle) * dist}px`);
        heart.style.setProperty('--tr', `${Math.random() * 360}deg`);
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1200);
      }
      clickCount = 0;
    } else {
      clearTimeout(clickTimer);
      clickTimer = setTimeout(() => { clickCount = 0; }, 400);
    }
  });

  // Gün hesaplama
  const startDate = new Date(2022, 8, 12); 
  document.getElementById('days-count').innerText = Math.floor((new Date() - startDate) / (1000*60*60*24));

  // Doğum günü
  const now = new Date();
  let next = new Date(now.getFullYear(), 7, 12);
  if (now > next && now.getDate() !== 12) next.setFullYear(now.getFullYear() + 1);
  const diff = Math.ceil((next - now) / (1000*60*60*24));
  document.getElementById('bday-status').innerText = (now.getMonth()===7 && now.getDate()===12) ? "Bugün Senin Doğum Günün! ❤️" : `Doğum gününe ${diff} gün kaldı...`;
</script>
</body>
</html>
