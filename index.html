<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Se7enSyndraxe Özel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap');
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    font-family: 'Poppins', sans-serif; 
    background-color: #000; 
    overflow: hidden; 
    height: 100vh; 
    width: 100vw; 
    position: fixed; 
  }

  /* GİRİŞ EKRANI - KIZIN FOTOĞRAFI BURADA DURUYOR */
  #entrance {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000 url('https://i.ibb.co/sJdgFtJb/WhatsApp-Image-2026-03-28-at-20-46-02.jpg') no-repeat center center;
    background-size: cover;
    z-index: 1000; 
    display: flex; 
    justify-content: center; 
    align-items: flex-end;
    padding-bottom: 15vh;
    transition: opacity 0.8s ease;
  }

  .pink-btn {
    background: #ff4d6d; color: white; border: none; padding: 18px 60px; font-size: 22px;
    border-radius: 50px; cursor: pointer; box-shadow: 0 8px 25px rgba(255, 77, 109, 0.6);
    font-weight: 600; z-index: 1001;
    -webkit-tap-highlight-color: transparent;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  /* ANA İÇERİK - SAHİL FOTOĞRAFI BURAYA GELECEK */
  #main-content {
    display: none; opacity: 0; flex-direction: column; align-items: center; justify-content: center;
    gap: 15px; height: 100vh; width: 100%; 
    /* Senin gönderdiğin sahil görseli arka plan oldu */
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://i.ibb.co/G4vT6t7v/sahil.jpg') no-repeat center center;
    background-size: cover;
    position: relative; transition: opacity 0.6s ease;
    z-index: 10;
  }

  .big-letter { 
    font-family: 'Great Vibes', cursive; 
    font-size: clamp(80px, 25vw, 120px); 
    color: #fff; /* Fotoğrafın üstünde beyaz daha asil durur */
    text-shadow: 0 0 20px rgba(255, 77, 109, 1);
    animation: glow 2.5s ease-in-out infinite;
    z-index: 20;
  }

  @keyframes glow {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.05); }
  }

  .card { 
    background: rgba(255, 255, 255, 0.9); 
    border-radius: 25px; padding: 20px; text-align: center; 
    width: 85%; max-width: 300px; 
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); 
    z-index: 20;
  }

  #days-count { font-size: 55px; font-weight: 700; color: #ff4d6d; display: block; line-height: 1; }
  .days-label { font-size: 14px; font-weight: 600; color: #590d22; margin-top: 5px; }

  #bday-status {
    margin-top: 10px; font-size: 14px; color: #ff4d6d; 
    font-weight: 600; font-style: italic;
  }

  .note-card { 
    background: rgba(255, 255, 255, 0.9); 
    border-left: 6px solid #ff4d6d; padding: 18px; 
    border-radius: 12px; width: 85%; max-width: 300px; color: #333; 
    z-index: 20;
  }
  
  .note-card h3 { margin-bottom: 5px; color: #ff4d6d; font-size: 24px; font-family: 'Great Vibes', cursive; }

  .footer { 
    margin-top: 15px; font-size: 10px; color: #fff; letter-spacing: 2px; 
    text-transform: uppercase; font-weight: 600; opacity: 0.9; text-shadow: 1px 1px 3px #000;
  }
</style>
</head>
<body>

  <div id="entrance">
    <button class="pink-btn" onclick="startSurprise()">Tıkla.</button>
  </div>

  <div id="main-content">
    <h1 class="big-letter">E</h1>
    
    <div class="card">
      <span id="days-count">0</span>
      <div class="days-label">Gündür Hayatımdasın</div>
      <div id="bday-status"></div>
    </div>

    <div class="note-card">
      <h3>E...</h3>
      <p>Dünyanın en güzel kızı... Seninle geçen her gün için teşekkür ederim Seni seviyorum :D</p>
    </div>

    <div class="footer">designed by se7ensyndraxe</div>
  </div>

<script>
  function startSurprise() {
    const ent = document.getElementById('entrance');
    const main = document.getElementById('main-content');
    
    ent.style.opacity = '0';
    setTimeout(() => { 
      ent.style.display = 'none'; 
      main.style.display = 'flex'; 
      setTimeout(() => { 
        main.style.opacity = '1'; 
      }, 50); 
    }, 800);
  }

  const startDate = new Date(2022, 8, 12); 
  const totalDays = Math.floor((new Date() - startDate) / (1000 * 60 * 60 * 24));
  document.getElementById('days-count').innerText = totalDays;

  function updateBirthday() {
    const now = new Date();
    let nextBday = new Date(now.getFullYear(), 7, 12); 
    if (now > nextBday && now.getDate() !== 12) nextBday.setFullYear(now.getFullYear() + 1);
    const diff = nextBday - now;
    const daysLeft = Math.ceil(diff / (1000 * 60 * 60 * 24));
    const statusEl = document.getElementById('bday-status');
    statusEl.innerText = (now.getMonth() === 7 && now.getDate() === 12) ? "Bugün Senin Doğum Günün! ❤️" : `Doğum gününe ${daysLeft} gün kaldı...`;
  }
  updateBirthday();
</script>

</body>
</html>
