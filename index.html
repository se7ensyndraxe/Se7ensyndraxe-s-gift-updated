<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; background-color: #000; color: #fff; overflow: hidden; height: 100vh; width: 100vw; }

  /* GİRİŞ EKRANI */
  #entrance {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000 url('https://i.ibb.co/sJdgFtJb/WhatsApp-Image-2026-03-28-at-20-46-02.jpg') no-repeat center center;
    background-size: cover; z-index: 999; display: flex; 
    justify-content: center; align-items: flex-end; padding-bottom: 20vh;
  }

  /* TIKLA BUTONU - CSS İLE EN SADE HALİ */
  .pink-btn {
    background-color: #ff4d6d; color: #fff; border: none; padding: 20px 70px; font-size: 24px;
    border-radius: 50px; cursor: pointer; font-weight: 600;
    box-shadow: 0 10px 30px rgba(255, 77, 109, 0.5);
    -webkit-tap-highlight-color: transparent; position: relative; z-index: 1000;
  }

  /* ANA İÇERİK */
  #main-content {
    display: none; width: 100%; height: 100vh;
    flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at center, #1a0508 0%, #000 100%);
    gap: 20px; position: relative;
  }

  #big-letter { 
    font-family: 'Great Vibes', cursive; font-size: 100px; color: #ff4d6d; 
    text-shadow: 0 0 20px rgba(255, 77, 109, 0.8); cursor: pointer; z-index: 10;
  }

  .card { 
    background: #fff; border-radius: 25px; padding: 25px; text-align: center; 
    width: 85%; max-width: 320px; color: #000; z-index: 5;
  }

  #days-count { font-size: 60px; font-weight: 800; color: #ff4d6d; display: block; }
  #bday-status { margin-top: 10px; font-size: 14px; color: #ff4d6d; font-weight: 600; }

  .note-card { 
    background: #fff0f3; border-left: 6px solid #ff4d6d; padding: 20px; 
    border-radius: 15px; width: 85%; max-width: 320px; color: #590d22; z-index: 5;
  }

  /* E HARFİ PATLAMASI İÇİN KALPLER */
  .burst-heart { position: absolute; pointer-events: none; z-index: 100; font-size: 20px; animation: burst 1s forwards; }
  @keyframes burst {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
  }

  /* ARKA PLAN KALPLERİ */
  .bg-heart { position: absolute; color: rgba(255, 77, 109, 0.3); animation: floatUp 7s linear infinite; z-index: 1; }
  @keyframes floatUp {
    0% { transform: translateY(110vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
  }

  .footer { font-size: 10px; color: #fff; opacity: 0.6; margin-top: 10px; letter-spacing: 2px; }
</style>
</head>
<body>

  <div id="entrance">
    <button class="pink-btn" id="trigger">Tıkla.</button>
  </div>

  <div id="main-content">
    <h1 id="big-letter">E</h1>
    <div class="card">
      <span id="days-count">0</span>
      <p style="font-weight: 600;">Gündür Hayatımdasın</p>
      <div id="bday-status"></div>
    </div>
    <div class="note-card">
      <h3 style="font-family: 'Great Vibes'; font-size: 28px; color: #ff4d6d;">E...</h3>
      <p>Dünyanın en güzel kızı... Seninle geçen her gün için teşekkür ederim. Seni seviyorum.</p>
    </div>
    <div class="footer">DESIGNED BY SE7ENSYNDRAXE</div>
  </div>

<script>
  // BUTON TIKLAMA - EN TEMEL YÖNTEM
  const btn = document.getElementById('trigger');
  const ent = document.getElementById('entrance');
  const main = document.getElementById('main-content');

  btn.onclick = function() {
    ent.style.display = 'none';
    main.style.display = 'flex';
    initBgHearts();
  };

  // ARKA PLAN KALPLERİ
  function initBgHearts() {
    for(let i=0; i<15; i++) {
      let h = document.createElement('div');
      h.className = 'bg-heart';
      h.innerHTML = '❤️';
      h.style.left = Math.random() * 100 + 'vw';
      h.style.animationDuration = (Math.random() * 3 + 5) + 's';
      h.style.animationDelay = Math.random() * 5 + 's';
      main.appendChild(h);
    }
  }

  // E HARFİ 2 TIKLAMA SURPRİZİ
  let count = 0;
  const eLetter = document.getElementById('big-letter');
  eLetter.onclick = function(e) {
    count++;
    if(count === 2) {
      for(let i=0; i<20; i++) {
        let p = document.createElement('div');
        p.className = 'burst-heart';
        p.innerHTML = '❤️';
        p.style.left = e.clientX + 'px';
        p.style.top = e.clientY + 'px';
        p.style.setProperty('--x', (Math.random()*400 - 200) + 'px');
        p.style.setProperty('--y', (Math.random()*400 - 200) + 'px');
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1000);
      }
      count = 0;
    }
    setTimeout(() => { count = 0; }, 500);
  };

  // GÜN VE DOĞUM GÜNÜ HESABI
  const start = new Date(2022, 8, 12);
  document.getElementById('days-count').innerText = Math.floor((new Date() - start) / 86400000);

  const now = new Date();
  let bday = new Date(now.getFullYear(), 7, 12);
  if(now > bday && now.getDate() !== 12) bday.setFullYear(now.getFullYear() + 1);
  let d = Math.ceil((bday - now) / 86400000);
  document.getElementById('bday-status').innerText = (now.getMonth()===7 && now.getDate()===12) ? "Bugün Senin Doğum Günün! ❤️" : `Doğum gününe ${d} gün kaldı...`;
</script>
</body>
</html>
